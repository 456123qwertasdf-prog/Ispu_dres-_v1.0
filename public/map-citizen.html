<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Evacuation Map - LSPU Emergency Response</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; overflow-x: hidden; }
    .container { max-width: 100%; box-sizing: border-box; }
    #map { width: 100%; height: calc(100vh - 140px); min-height: 320px; }
    .map-page-header { padding: 1rem 1rem 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .map-page-header h1 { font-size: 1.25rem; font-weight: 700; color: #1e293b; margin: 0; }
    .leaflet-popup-content-wrapper { border-radius: 12px; }
    .leaflet-popup-content { margin: 12px 16px; font-size: 14px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="flex items-center justify-between">
        <div class="navbar-brand-container">
          <img src="images/logolspu.jpg" alt="LSPU Logo" class="navbar-logo">
          <a href="user.html" class="navbar-brand">Kapiyu Emergency</a>
        </div>
        <div class="navbar-nav">
          <a href="safety-tips.html" class="btn btn-outline btn-sm" style="margin-right:8px;"><i class="bi bi-shield-check"></i> Safety Tips</a>
          <a href="user.html" class="btn btn-outline btn-sm"><i class="bi bi-arrow-left"></i> Dashboard</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="map-page-header container">
    <h1><i class="bi bi-map"></i> Campus Evacuation Map</h1>
    <p style="margin:0; font-size:0.875rem; color:#64748b;">Assembly points and key buildings. Primary evacuation: Open Field.</p>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/supabase.js"></script>
  <script>
    (function() {
      var CAMPUS_CENTER = [14.26284, 121.39743];
      var DEFAULT_ZOOM = 17.5;
      var waypoints = {
        'EvacuationField': { lat: 14.262689, lng: 121.398464, label: 'Open Field Assembly (Primary)' },
        'OpenField': { lat: 14.262670, lng: 121.398424, label: 'Open Field' },
        'CAS': { lat: 14.262387, lng: 121.396238, label: 'CAS Building' },
        'UniversityLibrary': { lat: 14.262026, lng: 121.398038, label: 'University Library' },
        'ActivityCenter': { lat: 14.263063, lng: 121.397719, label: 'Activity Center / Gym' },
        'UDRRMO': { lat: 14.263793, lng: 121.398357, label: 'UDRRMO' },
        'MainGate': { lat: 14.261633, lng: 121.397963, label: 'Main Gate' },
        'UniversityClinic': { lat: 14.263375, lng: 121.397378, label: 'University Clinic' },
        'MultiPurposeBuilding': { lat: 14.261890, lng: 121.398472, label: 'Multi-purpose Building' },
        'BasketballCourt': { lat: 14.262387, lng: 121.397904, label: 'Basketball Court' }
      };
      document.addEventListener('DOMContentLoaded', function() {
        function checkAuth() {
          if (window.emergencySystem && window.emergencySystem.isInitialized) {
            if (!window.emergencySystem.user) { window.location.href = 'login.html'; return; }
            initMap();
            return;
          }
          setTimeout(checkAuth, 100);
        }
        setTimeout(checkAuth, 200);
      });
      function initMap() {
        var map = L.map('map').setView(CAMPUS_CENTER, DEFAULT_ZOOM);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);
        var evacIcon = L.divIcon({
          className: 'evac-marker',
          html: '<span style="background:#10b981;color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);">🟢</span>',
          iconSize: [28, 28],
          iconAnchor: [14, 14]
        });
        var buildingIcon = L.divIcon({
          className: 'bldg-marker',
          html: '<span style="background:#3b82f6;color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);">📍</span>',
          iconSize: [24, 24],
          iconAnchor: [12, 12]
        });
        var primaryIds = ['EvacuationField', 'OpenField'];
        Object.keys(waypoints).forEach(function(id) {
          var w = waypoints[id];
          var isPrimary = primaryIds.indexOf(id) !== -1;
          var marker = L.marker([w.lat, w.lng], { icon: isPrimary ? evacIcon : buildingIcon }).addTo(map);
          marker.bindPopup('<strong>' + w.label + '</strong>' + (isPrimary ? '<br><small>Primary evacuation assembly point</small>' : ''));
        });
      }
    })();
  </script>
</body>
</html>
