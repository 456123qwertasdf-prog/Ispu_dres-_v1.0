<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - LSPU Emergency Response</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-family, 'Inter', sans-serif);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-navy, #0f172a) 0%, var(--primary-blue, #1e3a8a) 50%, var(--primary-blue-dark, #1e40af) 100%);
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="g" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="12" cy="12" r="1.5" fill="rgba(255,255,255,0.06)"/></pattern></defs><rect width="100" height="100" fill="url(%23g)"/></svg>');
            pointer-events: none;
        }
        
        .reset-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
        }
        
        .reset-container {
            background: var(--bg-white, #fff);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.08);
            width: 100%;
            padding: 2rem 2rem 1.75rem;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        
        .reset-brand {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .reset-brand-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 0.75rem;
            background: linear-gradient(135deg, var(--primary-navy, #0f172a) 0%, var(--primary-blue, #1e3a8a) 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(30, 58, 138, 0.35);
            overflow: hidden;
        }
        
        .reset-brand-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .reset-brand-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--gray-500, #6b7280);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }
        
        .reset-header h1 {
            color: var(--gray-900, #111827);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
            letter-spacing: -0.02em;
        }
        
        .reset-header p {
            color: var(--gray-500, #6b7280);
            font-size: 0.875rem;
        }
        
        .reset-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .form-group { margin-bottom: 1.25rem; position: relative; }
        
        .form-label {
            display: block;
            color: var(--gray-700, #374151);
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }
        
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            border: 2px solid var(--gray-200, #e5e7eb);
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--gray-50, #f9fafb);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary-blue, #1e3a8a);
            background: var(--bg-white, #fff);
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.12);
        }
        
        .input-icon-wrapper { position: relative; }
        
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400, #9ca3af);
            font-size: 1.1rem;
        }
        
        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray-400, #9ca3af);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 6px;
        }
        
        .password-toggle:hover { color: var(--gray-700, #374151); }
        
        .password-requirements {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: var(--gray-500, #6b7280);
            line-height: 1.5;
        }
        
        .password-strength { margin-top: 0.5rem; font-size: 0.75rem; }
        .password-strength-label { color: var(--gray-500, #6b7280); margin-bottom: 4px; }
        .password-strength-value { font-weight: 600; margin-left: 4px; }
        .password-strength.weak .password-strength-value { color: var(--error, #ef4444); }
        .password-strength.fair .password-strength-value { color: var(--warning, #f59e0b); }
        .password-strength.good .password-strength-value { color: var(--primary-blue-light, #2563eb); }
        .password-strength.strong .password-strength-value { color: var(--success, #10b981); }
        
        .password-strength-bar {
            height: 4px;
            background: var(--gray-200, #e5e7eb);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        
        .password-strength-bar-fill {
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }
        
        .password-strength.weak .password-strength-bar-fill { width: 25%; background: var(--error, #ef4444); }
        .password-strength.fair .password-strength-bar-fill { width: 50%; background: var(--warning, #f59e0b); }
        .password-strength.good .password-strength-bar-fill { width: 75%; background: var(--primary-blue-light, #2563eb); }
        .password-strength.strong .password-strength-bar-fill { width: 100%; background: var(--success, #10b981); }
        
        .reset-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-yellow-light, #fcd34d) 0%, var(--primary-yellow, #fbbf24) 50%, var(--primary-yellow-dark, #f59e0b) 100%);
            color: var(--primary-navy, #0f172a);
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.35);
            margin-top: 0.5rem;
            letter-spacing: 0.02em;
        }
        
        .reset-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.45);
        }
        
        .reset-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }
        
        .back-to-login {
            text-align: center;
            margin-top: 1.25rem;
        }
        
        .back-to-login a {
            color: var(--primary-blue, #1e3a8a);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .back-to-login a:hover { text-decoration: underline; }
        
        .error-message {
            background: #fef2f2;
            color: var(--primary-red, #dc2626);
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
            border: 1px solid #fecaca;
        }
        .error-message.show { display: block; }
        
        .success-message {
            background: #ecfdf5;
            color: var(--success, #059669);
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
            border: 1px solid #a7f3d0;
        }
        .success-message.show { display: block; }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(15, 23, 42, 0.25);
            border-radius: 50%;
            border-top-color: var(--primary-navy, #0f172a);
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="reset-wrapper">
        <div class="reset-container">
            <div class="reset-brand">
                <div class="reset-brand-logo">
                    <img src="images/logolspu.jpg" alt="LSPU">
                </div>
                <p class="reset-brand-title">LSPU Emergency Response System</p>
            </div>
            <div class="reset-header">
                <h1>Reset Your Password</h1>
                <p>Enter your new password below to regain secure access.</p>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label class="form-label" for="newPassword">New Password</label>
                    <div class="input-icon-wrapper">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" id="newPassword" class="form-input" placeholder="Enter new password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('newPassword', this)">
                            <i class="bi bi-eye" id="newPasswordToggle"></i>
                        </button>
                    </div>
                    <div id="passwordStrength" class="password-strength" style="display: none;">
                        <div class="password-strength-label">
                            Password Strength: <span class="password-strength-value"></span>
                        </div>
                        <div class="password-strength-bar">
                            <div class="password-strength-bar-fill"></div>
                        </div>
                    </div>
                    <div class="password-requirements">
                        Must contain: 8+ characters, uppercase, lowercase, number, special character
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <div class="input-icon-wrapper">
                        <i class="bi bi-lock-fill input-icon"></i>
                        <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm new password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)">
                            <i class="bi bi-eye" id="confirmPasswordToggle"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="reset-btn" id="resetBtn">
                    <span id="resetBtnText">Reset Password</span>
                    <span id="resetBtnLoading" class="hidden">
                        <span class="loading"></span> Resetting...
                    </span>
                </button>
            </form>
        
            <div class="back-to-login">
                <a href="login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script>
        // Supabase: Add this page's full URL to Authentication → URL Configuration → Redirect URLs
        // e.g. https://your-domain.com/reset-password.html and http://localhost:PORT/reset-password.html
        let emergencySystem;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            // Wait for system initialization
            await new Promise(resolve => {
                const checkInit = () => {
                    if (window.emergencySystem && window.emergencySystem.isInitialized) {
                        emergencySystem = window.emergencySystem;
                        resolve();
                    } else {
                        setTimeout(checkInit, 100);
                    }
                };
                checkInit();
            });
            
            // Recover session from email link (PKCE code or hash), then check token
            await recoverSessionFromUrl();
            checkResetToken();
            
            // Set up form handler
            document.getElementById('resetPasswordForm').addEventListener('submit', handleResetPassword);
            
            // Set up password strength checker
            document.getElementById('newPassword').addEventListener('input', (e) => {
                updatePasswordStrength(e.target.value);
            });
        });
        
        /** Recover auth session from the reset link. Supabase may send either:
         *  - PKCE: ?code=... in query (must call exchangeCodeForSession)
         *  - Implicit: #access_token=...&type=recovery in hash (client uses it when we use auth) */
        async function recoverSessionFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                try {
                    const { data, error } = await emergencySystem.supabase.auth.exchangeCodeForSession(code);
                    if (error) throw error;
                    // Remove code from URL so refresh doesn't reuse it
                    const url = new URL(window.location.href);
                    url.searchParams.delete('code');
                    url.searchParams.delete('next');
                    if (window.history.replaceState) {
                        window.history.replaceState({}, document.title, url.pathname + url.search + (url.hash || ''));
                    }
                } catch (err) {
                    console.error('Session recovery failed:', err);
                    showError('This reset link is invalid or has expired. Please request a new password reset.');
                }
            }
        }

        async function checkResetToken() {
            const urlParams = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const hasCode = urlParams.get('code');
            const hasHashToken = hashParams.get('access_token') || hashParams.get('type') === 'recovery';
            const { data: { session } } = await emergencySystem.supabase.auth.getSession();
            const hasToken = hasCode || hasHashToken || !!session;
            
            if (!hasToken) {
                showError('Invalid or expired reset link. Please request a new password reset.');
            }
        }
        
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }
        
        function validatePassword(password) {
            const errors = [];
            
            if (password.length < 8) {
                errors.push('Password must be at least 8 characters');
            }
            if (!/[A-Z]/.test(password)) {
                errors.push('Password must contain at least one uppercase letter');
            }
            if (!/[a-z]/.test(password)) {
                errors.push('Password must contain at least one lowercase letter');
            }
            if (!/[0-9]/.test(password)) {
                errors.push('Password must contain at least one number');
            }
            if (!/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                errors.push('Password must contain at least one special character (!@#$%^&*...)');
            }
            
            return {
                isValid: errors.length === 0,
                errors: errors
            };
        }
        
        function calculatePasswordStrength(password) {
            if (!password) return null;
            
            let strength = 0;
            let label = '';
            
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;
            
            if (strength <= 2) {
                label = 'Weak';
            } else if (strength <= 4) {
                label = 'Fair';
            } else if (strength <= 5) {
                label = 'Good';
            } else {
                label = 'Strong';
            }
            
            return { strength, label, class: label.toLowerCase() };
        }
        
        function updatePasswordStrength(password) {
            const strengthDiv = document.getElementById('passwordStrength');
            
            if (!password) {
                strengthDiv.style.display = 'none';
                return;
            }
            
            strengthDiv.style.display = 'block';
            const strength = calculatePasswordStrength(password);
            const strengthValue = strengthDiv.querySelector('.password-strength-value');
            const strengthBar = strengthDiv.querySelector('.password-strength-bar-fill');
            
            strengthValue.textContent = strength.label;
            strengthDiv.className = `password-strength ${strength.class}`;
        }
        
        async function handleResetPassword(e) {
            e.preventDefault();
            
            const resetBtn = document.getElementById('resetBtn');
            const resetBtnText = document.getElementById('resetBtnText');
            const resetBtnLoading = document.getElementById('resetBtnLoading');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Hide previous messages
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            // Validate password strength
            const passwordValidation = validatePassword(newPassword);
            if (!passwordValidation.isValid) {
                showError('Password requirements not met:\n' + passwordValidation.errors.join('\n'));
                return;
            }
            
            try {
                // Show loading state
                resetBtn.disabled = true;
                resetBtnText.classList.add('hidden');
                resetBtnLoading.classList.remove('hidden');
                
                // Update password using Supabase
                // Supabase automatically handles the session from the URL hash
                const { data, error } = await emergencySystem.supabase.auth.updateUser({
                    password: newPassword
                });
                
                if (error) throw error;
                
                // Success!
                showSuccess('Password reset successfully! Redirecting to login...');
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                console.error('Password reset failed:', error);
                
                let errorMessage = 'Failed to reset password';
                if (error.message.includes('expired') || error.message.includes('invalid')) {
                    errorMessage = 'This reset link has expired or is invalid. Please request a new password reset.';
                } else if (error.message.includes('session')) {
                    errorMessage = 'Invalid or expired reset link. Please request a new password reset.';
                } else {
                    errorMessage = error.message || 'Failed to reset password. Please try again.';
                }
                
                showError(errorMessage);
            } finally {
                // Hide loading state
                resetBtn.disabled = false;
                resetBtnText.classList.remove('hidden');
                resetBtnLoading.classList.add('hidden');
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
        }
    </script>
</body>
</html>
