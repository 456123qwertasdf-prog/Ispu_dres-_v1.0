<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSPU Emergency Response System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <script>
        // If this is a password reset callback (Supabase sent user to root with token/code), send to reset page
        var hash = window.location.hash || '';
        var search = window.location.search || '';
        var params = new URLSearchParams(search);
        var hashParams = new URLSearchParams(hash.substring(1));
        var hasCode = params.get('code');
        var hasRecoveryHash = hashParams.get('access_token') || hashParams.get('type') === 'recovery';
        if (hasCode || hasRecoveryHash) {
            window.location.replace('reset-password.html' + search + hash);
            throw new Error('redirect');
        }
        window.location.replace('login.html');
    </script>
</head>
<body>
    <div class="flex items-center justify-center min-h-screen bg-gray-50">
        <div class="text-center">
            <div class="text-6xl mb-4">🚨</div>
            <h1 class="text-3xl font-bold mb-4">LSPU Emergency Response System</h1>
            <p class="text-gray-600 mb-8">AI-Powered Emergency Management</p>
            <p class="text-gray-500">Redirecting to login...</p>
            <a href="login.html" class="btn btn-primary btn-lg">🚀 Access System</a>
        </div>
    </div>
</body>
</html>
